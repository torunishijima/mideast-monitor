name: Update Monitor

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（UTC）= 日本時間 毎時9分
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          AISSTREAM_API_KEY:      ${{ secrets.AISSTREAM_API_KEY }}
          OPENSKY_USERNAME:       ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD:       ${{ secrets.OPENSKY_PASSWORD }}
          NASA_FIRMS_MAP_KEY:     ${{ secrets.NASA_FIRMS_MAP_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/data/history.json
          git diff --cached --quiet || git commit -m "chore: update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
